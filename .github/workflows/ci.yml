name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: autocrm
          POSTGRES_PASSWORD: autocrm
          POSTGRES_DB: autocrm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U autocrm -d autocrm_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://autocrm:autocrm@127.0.0.1:5432/autocrm_test
      TEST_DATABASE_URL: postgresql+asyncpg://autocrm:autocrm@127.0.0.1:5432/autocrm_test
      SECRET_KEY: ci-only-secret-key
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - name: Ruff
        run: ruff check app tests scripts
      - name: Check migrations
        run: alembic upgrade head
      - name: Pytest
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type-check and build
        run: npm run build
